name: Shop – EC2 Debug

on:
  workflow_dispatch:

jobs:
  debug:
    name: Check EC2 Shop State
    runs-on: ubuntu-latest

    steps:
      - name: Open port 22 for this runner
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          RUNNER_IP=$(curl -s ifconfig.me/ip)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_EC2_SG_ID }} \
            --protocol tcp --port 22 --cidr "${RUNNER_IP}/32" \
            --region ${{ secrets.AWS_REGION }} || true

      - name: SSH diagnostics
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo "=== PM2 list ==="
            pm2 list

            echo ""
            echo "=== Port 3003 listening? ==="
            ss -tlnp | grep 3003 || echo "Nothing on port 3003"

            echo ""
            echo "=== curl localhost:3003 ==="
            curl -sL -o /dev/null -w "HTTP: %{http_code}" http://localhost:3003 2>/dev/null

            echo ""
            echo "=== curl localhost:3003/en ==="
            curl -sL -o /dev/null -w "HTTP: %{http_code}" http://localhost:3003/en 2>/dev/null

            echo ""
            echo "=== All nginx config files ==="
            find /etc/nginx -name "*.conf" -o -name "*plantathome*" 2>/dev/null | sort
            ls /etc/nginx/sites-enabled/ 2>/dev/null
            ls /etc/nginx/conf.d/ 2>/dev/null

            echo ""
            echo "=== nginx sites-enabled contents ==="
            for f in /etc/nginx/sites-enabled/*; do
              echo "--- $f ---"
              cat "$f" 2>/dev/null | grep -E "server_name|proxy_pass|listen|root|location" | head -20
            done

            echo ""
            echo "=== .next/required-server-files.json (appDir?) ==="
            cat /var/www/plantathome/shop-src/.next/required-server-files.json 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print('appDir:', d.get('appDir')); print('nextConfigOutput:', d.get('config',{}).get('output'))" 2>/dev/null

            echo ""
            echo "=== Standalone output? ==="
            ls /var/www/plantathome/shop-src/.next/standalone 2>/dev/null || echo "No standalone directory"

      - name: Close port 22 for this runner
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_EC2_SG_ID }} \
            --protocol tcp --port 22 --cidr "${RUNNER_IP}/32" \
            --region ${{ secrets.AWS_REGION }} || true
