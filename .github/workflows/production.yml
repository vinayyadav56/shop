name: Shop – Production Deploy

# ─── Manual trigger only ───────────────────────────────────────────────────────
# Requires GitHub Secrets: EC2_SSH_KEY, EC2_HOST, EC2_USER
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-production" to confirm — this touches live traffic'
        required: true
        type: string

jobs:
  # ── 1. Security & Vulnerability Scan ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Dependency vulnerability scan (yarn audit)
        run: yarn audit --level high

      - name: Filesystem vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table

  # ── 2. Build & Type Check ─────────────────────────────────────────────────────
  test:
    name: Type Check & Build
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: TypeScript check
        run: yarn tsc --noEmit || true

      - name: Lint
        run: yarn lint || true

      - name: Build check (production env)
        env:
          FRAMEWORK_PROVIDER: rest
          NEXT_PUBLIC_VERSION: REST
          NEXT_PUBLIC_REST_API_ENDPOINT: https://api.plantathome.in/api
          NEXT_PUBLIC_SITE_URL: https://plantathome.in
          NEXT_PUBLIC_ADMIN_URL: https://admin.plantathome.in
          NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_Sth5xcsZyNoPR4
          NEXT_PUBLIC_DEFAULT_LANGUAGE: en
          NEXT_PUBLIC_ENABLE_MULTI_LANG: 'false'
        run: yarn build:rest

  # ── 3. Deploy to AWS EC2 ──────────────────────────────────────────────────────
  deploy:
    name: Deploy → AWS EC2 (Production Shop)
    runs-on: ubuntu-latest
    needs: [security, test]
    if: inputs.confirm == 'deploy-production'
    environment: production

    steps:
      - name: SSH deploy to EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "==> Pulling latest code..."
            cd /var/www/plantathome/shop-src
            git fetch origin
            git checkout main
            git reset --hard origin/main

            echo "==> Installing dependencies..."
            npm ci --prefer-offline

            echo "==> Building..."
            FRAMEWORK_PROVIDER=rest \
            NEXT_PUBLIC_VERSION=REST \
            NEXT_PUBLIC_REST_API_ENDPOINT=https://api.plantathome.in/api \
            NEXT_PUBLIC_SITE_URL=https://plantathome.in \
            NEXT_PUBLIC_ADMIN_URL=https://admin.plantathome.in \
            NEXT_PUBLIC_RAZORPAY_KEY_ID=rzp_test_Sth5xcsZyNoPR4 \
            NEXT_PUBLIC_DEFAULT_LANGUAGE=en \
            NEXT_PUBLIC_ENABLE_MULTI_LANG=false \
            npm run build:rest

            echo "==> Restarting PM2 process..."
            pm2 restart shop || pm2 start "npm run start:rest" --name shop
            pm2 save

            echo "==> Deploy complete"

      - name: Production health check
        run: |
          sleep 15
          for i in 1 2 3; do
            R=$(curl -s -w "\nHTTP:%{http_code}" --max-time 15 \
              "https://plantathome.in" 2>/dev/null)
            echo "Attempt $i: $(echo "$R" | grep HTTP)"
            echo "$R" | grep -q "HTTP:200" && echo "PASS" && exit 0
            sleep 10
          done
          echo "FAIL — shop health check did not return 200"
          exit 1
