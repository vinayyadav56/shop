name: Shop – Staging Deploy

# ─── Manual trigger only ───────────────────────────────────────────────────────
# Requires GitHub Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_SHOP_PROJECT_ID
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm staging deployment'
        required: true
        type: string

jobs:
  # ── 1. Security & Vulnerability Scan ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Dependency vulnerability scan (yarn audit)
        run: yarn audit --level high

      - name: Filesystem vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table

  # ── 2. Build & Type Check ─────────────────────────────────────────────────────
  test:
    name: Type Check & Build
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: TypeScript check
        run: yarn tsc --noEmit || true

      - name: Lint
        run: yarn lint || true

      - name: Build check (staging env)
        env:
          FRAMEWORK_PROVIDER: rest
          NEXT_PUBLIC_VERSION: REST
          NEXT_PUBLIC_REST_API_ENDPOINT: https://plantathome-api-production.up.railway.app/api
          NEXT_PUBLIC_SITE_URL: https://plantathome-shop-staging.vercel.app
          NEXT_PUBLIC_ADMIN_URL: https://plantathome-admin-staging.vercel.app
          NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_Sth5xcsZyNoPR4
          NEXT_PUBLIC_DEFAULT_LANGUAGE: en
          NEXT_PUBLIC_ENABLE_MULTI_LANG: 'false'
        run: yarn build:rest

  # ── 3. Deploy to Vercel (Staging) ─────────────────────────────────────────────
  deploy:
    name: Deploy → Vercel (Staging Shop)
    runs-on: ubuntu-latest
    needs: [security, test]
    if: inputs.confirm == 'deploy'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_SHOP_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
