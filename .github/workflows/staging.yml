name: Shop – Staging Deploy

# ─── Auto-deploy on push to staging; manual trigger also available ─────────────
# Requires GitHub Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_SHOP_PROJECT_ID
on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (any branch allowed for staging)'
        required: false
        default: 'staging'
        type: string
      confirm:
        description: 'Type "deploy" to confirm (optional for manual run)'
        required: false
        default: 'deploy'
        type: string

jobs:
  # ── 1. Security & Vulnerability Scan ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Dependency vulnerability scan (yarn audit)
        run: yarn audit --level high || true

      - name: Filesystem vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          format: table

  # ── 2. Build & Type Check ─────────────────────────────────────────────────────
  test:
    name: Type Check & Build
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: TypeScript check
        run: yarn tsc --noEmit || true

      - name: Lint
        run: yarn lint || true

      - name: Build check (staging env)
        env:
          APPLICATION_MODE: staging
          FRAMEWORK_PROVIDER: rest
          NEXT_PUBLIC_VERSION: REST
          NEXT_PUBLIC_REST_API_ENDPOINT: https://plantathome-production.up.railway.app/api
          NEXT_PUBLIC_SITE_URL: https://plantathome-shop-staging.vercel.app
          NEXT_PUBLIC_ADMIN_URL: https://plantathome-admin-staging.vercel.app
          NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.STAGING_RAZORPAY_KEY_ID }}
          NEXT_PUBLIC_DEFAULT_LANGUAGE: en
          NEXT_PUBLIC_ENABLE_MULTI_LANG: 'false'
        run: yarn build:rest

  # ── 3. Deploy to Vercel (Staging) ─────────────────────────────────────────────
  deploy:
    name: Deploy → Vercel (Staging Shop)
    runs-on: ubuntu-latest
    # Fail fast instead of zombie-ing: the Vercel-side build occasionally hangs;
    # a hung run used to sit "in_progress" for hours and block later deploys.
    timeout-minutes: 25
    needs: [security, test]
    if: github.event_name == 'push' || inputs.confirm == 'deploy'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cancelling a hung GH run kills the local `vercel` CLI but NOT the
      # Vercel-side build it started — those keep "Building…" and, on a
      # one-build-at-a-time plan, block every new deploy in the queue. Cancel
      # any stale BUILDING/QUEUED deployments first so this deploy gets a slot.
      # Best-effort: never fail the deploy on this.
      - name: Cancel stale Vercel builds (unblock the queue)
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SHOP_PROJECT_ID }}
        run: |
          set +e
          TEAM=""
          [ -n "$VERCEL_ORG_ID" ] && TEAM="&teamId=$VERCEL_ORG_ID"
          LIST=$(curl -s "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&limit=40$TEAM" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          IDS=$(echo "$LIST" | jq -r '.deployments[]? | select((.state // .readyState) as $s | $s=="BUILDING" or $s=="QUEUED" or $s=="INITIALIZING") | .uid')
          if [ -z "$IDS" ]; then
            echo "No stale building deployments."
          else
            for id in $IDS; do
              echo "Cancelling stale Vercel build: $id"
              curl -s -X PATCH "https://api.vercel.com/v12/deployments/$id/cancel?${VERCEL_ORG_ID:+teamId=$VERCEL_ORG_ID}" \
                -H "Authorization: Bearer $VERCEL_TOKEN" -o /dev/null -w "  -> HTTP %{http_code}\n"
            done
            sleep 5
          fi

      - name: Deploy to Vercel
        run: |
          npx vercel --token "$VERCEL_TOKEN" \
            --yes --prod \
            --build-env "NODE_OPTIONS=--max-old-space-size=4096" \
            --build-env "NEXT_PUBLIC_RAZORPAY_KEY_ID=$STAGING_RAZORPAY_KEY_ID" \
            --build-env "APPLICATION_MODE=staging" \
            --build-env "FRAMEWORK_PROVIDER=rest" \
            --build-env "NEXT_PUBLIC_VERSION=REST" \
            --build-env "NEXT_PUBLIC_REST_API_ENDPOINT=https://plantathome-production.up.railway.app/api" \
            --build-env "NEXT_PUBLIC_SITE_URL=https://plantathome-shop-staging.vercel.app" \
            --build-env "NEXT_PUBLIC_ADMIN_URL=https://plantathome-admin-staging.vercel.app" \
            --build-env "NEXT_PUBLIC_DEFAULT_LANGUAGE=en" \
            --build-env "NEXT_PUBLIC_ENABLE_MULTI_LANG=false" \
            --build-env "NEXT_PUBLIC_GOOGLE_MAP_API_KEY=$GOOGLE_MAP_API_KEY" \
            --env "CHATBOT_SERVICE_URL=https://chatbot-service-production-321d.up.railway.app" \
            --env "CHATBOT_SERVICE_API_KEY=$AI_CHAT_SHARED_SECRET"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SHOP_PROJECT_ID }}
          STAGING_RAZORPAY_KEY_ID: ${{ secrets.STAGING_RAZORPAY_KEY_ID }}
          GOOGLE_MAP_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAP_API_KEY }}
          AI_CHAT_SHARED_SECRET: ${{ secrets.AI_CHAT_SHARED_SECRET }}
