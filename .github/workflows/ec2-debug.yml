name: Shop – EC2 Debug

on:
  workflow_dispatch:

jobs:
  debug:
    name: Check EC2 Shop State
    runs-on: ubuntu-latest

    steps:
      - name: Open port 22 for this runner
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          RUNNER_IP=$(curl -s ifconfig.me/ip)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_EC2_SG_ID }} \
            --protocol tcp --port 22 --cidr "${RUNNER_IP}/32" \
            --region ${{ secrets.AWS_REGION }} || true

      - name: SSH diagnostics
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo "=== PM2 describe shop ==="
            pm2 describe shop 2>/dev/null || echo "no shop process"

            echo ""
            echo "=== Ports listening ==="
            ss -tlnp | grep -E "3000|3003|3002"

            echo ""
            echo "=== curl -v localhost:3003/ (first 30 lines) ==="
            curl -sv http://localhost:3003/ 2>&1 | head -30 || true

            echo ""
            echo "=== package.json start script on EC2 ==="
            cat /var/www/plantathome/shop-src/package.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps(d.get('scripts',{}), indent=2))"

            echo ""
            echo "=== required-server-files.json appDir ==="
            python3 -c "
import json
with open('/var/www/plantathome/shop-src/.next/required-server-files.json') as f:
    d = json.load(f)
print('appDir:', d.get('appDir'))
print('relativeAppDir:', d.get('relativeAppDir'))
" 2>/dev/null || echo "could not read"

            echo ""
            echo "=== .next/server/pages/ contents ==="
            ls /var/www/plantathome/shop-src/.next/server/pages/ 2>/dev/null | head -20 || echo "no server/pages"
            ls /var/www/plantathome/shop-src/.next/server/app/ 2>/dev/null | head -10 || echo "no server/app"

            echo ""
            echo "=== routes-manifest redirects ==="
            python3 -c "
import json
with open('/var/www/plantathome/shop-src/.next/routes-manifest.json') as f:
    d = json.load(f)
print('redirects:', len(d.get('redirects', [])))
print('rewrites:', json.dumps(d.get('rewrites', [])[:3], indent=2))
print('i18n:', json.dumps(d.get('i18n', {}), indent=2))
" 2>/dev/null || echo "could not read"

            echo ""
            echo "=== swap status ==="
            swapon --show 2>/dev/null || echo "no swap"
            free -h

      - name: Close port 22 for this runner
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_EC2_SG_ID }} \
            --protocol tcp --port 22 --cidr "${RUNNER_IP}/32" \
            --region ${{ secrets.AWS_REGION }} || true
