<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <!-- House + plant icon (matches uploaded logo) -->
  <g transform="translate(2, 2)">
    <!-- House left wall -->
    <line x1="4" y1="56" x2="4" y2="28" stroke="#2C5F2E" stroke-width="2.8" stroke-linecap="round"/>
    <!-- House right wall -->
    <line x1="54" y1="28" x2="54" y2="56" stroke="#2C5F2E" stroke-width="2.8" stroke-linecap="round"/>
    <!-- House roof left -->
    <line x1="4" y1="28" x2="29" y2="8" stroke="#2C5F2E" stroke-width="2.8" stroke-linecap="round"/>
    <!-- House roof right -->
    <line x1="29" y1="8" x2="54" y2="28" stroke="#2C5F2E" stroke-width="2.8" stroke-linecap="round"/>
    <!-- House bottom left -->
    <line x1="4" y1="56" x2="18" y2="56" stroke="#2C5F2E" stroke-width="2.8" stroke-linecap="round"/>
    <!-- House bottom right -->
    <line x1="40" y1="56" x2="54" y2="56" stroke="#2C5F2E" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Plant stem -->
    <line x1="29" y1="56" x2="29" y2="38" stroke="#2C5F2E" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Left leaf -->
    <path d="M29 48 C22 44 17 36 21 30 C23 35 26 42 29 48Z" fill="#2C5F2E"/>
    <!-- Right leaf large -->
    <path d="M29 44 C36 37 43 32 41 24 C37 28 32 37 29 44Z" fill="#2C5F2E"/>
    <!-- Top center leaf -->
    <path d="M29 37 C27 30 29 22 34 19 C33 24 31 31 29 37Z" fill="#2C5F2E"/>
  </g>
  <!-- PLANTATHOME -->
  <text x="72" y="32" font-family="'Montserrat','Arial Black',sans-serif" font-weight="800" font-size="20" letter-spacing="2.5" fill="#2C5F2E">PLANTATHOME</text>
  <!-- Divider lines + tagline -->
  <line x1="72" y1="40" x2="92" y2="40" stroke="#2C5F2E" stroke-width="0.8" opacity="0.6"/>
  <text x="96" y="44" font-family="'Montserrat','Arial',sans-serif" font-weight="400" font-size="8" letter-spacing="3.5" fill="#2C5F2E" opacity="0.85">BRING NATURE HOME</text>
  <line x1="214" y1="40" x2="234" y2="40" stroke="#2C5F2E" stroke-width="0.8" opacity="0.6"/>
</svg>
