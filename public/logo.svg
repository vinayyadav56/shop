    <line x1="16" y1="17" x2="24" y2="22" stroke="#B7E4C7" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
    <line x1="16" y1="23" x2="22" y2="27" stroke="#B7E4C7" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
    <!-- Stem -->
